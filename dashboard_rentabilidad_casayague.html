<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Yagüe · Rentabilidad por Área</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --vino:#7B2D42;--vm:#A8485E;--vc:#F5E6EA;
  --turismo:#1F4E79;--turismoc:#E3EEF9;
  --vinos:#4A4078;--vinosc:#EEEDFE;
  --hacienda:#633806;--haciendac:#FAEEDA;
  --adm:#444441;--admc:#F1EFE8;
  --verde:#27500A;--verdec:#EAF3DE;
  --rojo:#791F1F;--rojoc:#FCEBEB;
  --bg:#F7F5F2;--borde:#E2DDD8;
  --g1:#1A1A1A;--g2:#3D3D3D;--g3:#7A7A7A;--g4:#C8C8C8;--g5:#F0F0F0;
  --sh:0 1px 4px rgba(0,0,0,.07);
  --r:10px;--rs:6px
}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--g1);min-height:100vh}
.topbar{background:var(--vino);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topbar h1{font-size:16px;color:#fff;font-weight:400;letter-spacing:.02em}
.topbar .sub{font-size:11px;color:rgba(255,255,255,.5);font-family:sans-serif;margin-top:2px}
.tb-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.periodo-sel{display:flex;gap:4px}
.periodo-btn{font-family:sans-serif;font-size:11px;padding:5px 11px;border-radius:99px;border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s}
.periodo-btn.active,.periodo-btn:hover{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.5)}
.sync-btn{font-family:sans-serif;font-size:11px;padding:5px 12px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.sync-btn:hover{background:rgba(255,255,255,.2)}
.sync-btn.loading{opacity:.7;pointer-events:none}
.content{padding:20px 24px}
.section-label{font-family:sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--g3);margin-bottom:10px;margin-top:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.card{background:#fff;border:1px solid var(--borde);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.ch{padding:12px 16px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between}
.ch h3{font-size:12px;font-weight:400;font-family:sans-serif;color:var(--g2)}
.cb{padding:14px 16px}
.area-card{background:#fff;border:1px solid var(--borde);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.area-head{padding:14px 16px;border-bottom:1px solid var(--borde)}
.area-name{font-size:13px;font-family:sans-serif;font-weight:600;margin-bottom:2px}
.area-sub{font-size:11px;font-family:sans-serif;color:var(--g3)}
.area-body{padding:14px 16px}
.area-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--g5);font-family:sans-serif;font-size:12px}
.area-row:last-child{border-bottom:none;padding-top:8px;font-weight:600;font-size:13px}
.area-row .lbl{color:var(--g3)}
.area-row .val{font-weight:500}
.pos{color:var(--verde)}.neg{color:var(--rojo)}
.kpi{background:#fff;border:1px solid var(--borde);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
.kpi .kl{font-size:10px;font-family:sans-serif;color:var(--g3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.kpi .kv{font-size:22px;font-weight:400;line-height:1}
.kpi .ks{font-size:10px;font-family:sans-serif;color:var(--g3);margin-top:3px}
.kpi.pos .kv{color:var(--verde)}.kpi.neg .kv{color:var(--rojo)}.kpi.neutral .kv{color:var(--g1)}
.bar-wrap{margin-bottom:8px}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;font-family:sans-serif;margin-bottom:3px}
.bar-track{height:8px;background:var(--g5);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.badge{display:inline-block;font-size:10px;font-family:sans-serif;padding:2px 7px;border-radius:99px;font-weight:500}
.b-pos{background:var(--verdec);color:var(--verde)}
.b-neg{background:var(--rojoc);color:var(--rojo)}
.b-neu{background:var(--g5);color:var(--g3)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-family:sans-serif;font-size:12px}
thead th{padding:8px 12px;background:var(--g5);color:var(--g3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;text-align:left;border-bottom:1px solid var(--borde);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--borde);vertical-align:middle}
tbody tr:last-child td{border-bottom:none;font-weight:500;background:var(--g5)}
tbody tr:hover:not(:last-child) td{background:var(--bg)}
.loading-state{text-align:center;padding:40px;font-family:sans-serif;font-size:13px;color:var(--g3)}
.error-state{background:var(--rojoc);border:1px solid #F7C1C1;border-radius:var(--rs);padding:12px 16px;font-family:sans-serif;font-size:12px;color:var(--rojo);margin-bottom:12px;display:none}
.last-sync{font-family:sans-serif;font-size:10px;color:rgba(255,255,255,.4)}
.tag-area{font-size:10px;font-family:sans-serif;padding:2px 8px;border-radius:99px;font-weight:500}
@media(max-width:700px){.g4,.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
@media(max-width:480px){.g4,.g3,.g2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Casa Yagüe · Rentabilidad por Área</h1>
    <div class="sub">Conectado a Alegra · Datos en tiempo real</div>
  </div>
  <div class="tb-right">
    <div class="periodo-sel">
      <button class="periodo-btn" onclick="setPeriodo('mes')">Este mes</button>
      <button class="periodo-btn active" onclick="setPeriodo('trimestre')">Trimestre</button>
      <button class="periodo-btn" onclick="setPeriodo('anio')">Este año</button>
    </div>
    <button class="sync-btn" id="sync-btn" onclick="cargarDatos()">↻ Actualizar</button>
    <div class="last-sync" id="last-sync"></div>
  </div>
</div>

<div class="content">
  <div class="error-state" id="error-box"></div>

  <div class="loading-state" id="loading">
    <div style="font-size:24px;margin-bottom:8px">⏳</div>
    Conectando con Alegra...
  </div>
  <div id="main-content"></div>
</div>

<script>
const PROXY_URL = 'https://script.googleusercontent.com/a/macros/casayague.com/echo?user_content_key=AUkAhnRj2GykuzWIvfLOXSGXU6pxaF2CQYr3VlKk-kWjjiZYGQ8Cq0Z3m2dDi6I9ydm_F8B_ycrGCVAOwk01m156e3HvGLT-9TqlYsi2KWDVpfSNJIOGQknSK9FuvZsnYRG0yiXKqOwHGTU6A1rslykLbvhe2sLeInXgNZdV5-aZvDXAk7m6wjwfu8Cq3jzdbS4vlE-E_v6xlali--X4uX8xzPKcUw2YiYcphLSppy7_IDtYpprQNhfb-7sK83iPfKWWHIDGq_A1xjdUoGw-l0xpxyGPdIh4IsVoFn2K6s7sjIFC-qJ_IV4&lib=MdrT-ywdxbSmCtfDaRAWEM6JSUuRfoGnC';

// ── DISTRIBUCIÓN POR ÁREA ───────────────────────────────
// Según planillas aprobadas por Maca
const DIST = {
  // Personal
  'Leo':                    {T:0,  V:100, H:0,  A:0},
  'Juancho':                {T:0,  V:0,   H:100,A:0},
  'Simon':                  {T:0,  V:100, H:0,  A:0},
  'Elba':                   {T:100,V:0,   H:0,  A:0},
  'Marcia':                 {T:40, V:60,  H:0,  A:0},
  'Macarena':               {T:40, V:20,  H:0,  A:40},
  'Jorge Cayul':            {T:0,  V:100, H:0,  A:0},
  'Jardineros':             {T:100,V:0,   H:0,  A:0},
  'Cocinero':               {T:100,V:0,   H:0,  A:0},
  'Jornales':               {T:0,  V:100, H:0,  A:0},
  // Gastos compartidos
  'Energia electrica':      {T:50, V:50,  H:0,  A:0},
  'Internet':               {T:100,V:0,   H:0,  A:0},
  'Celulares':              {T:33, V:33,  H:0,  A:34},
  'Seguros':                {T:0,  V:0,   H:0,  A:100},
  'Combustible':            {T:20, V:20,  H:40, A:20},
  'Contador':               {T:25, V:25,  H:25, A:25},
  'Cargas sociales':        {T:25, V:25,  H:25, A:25},
  'Mantenimiento edificios':{T:70, V:20,  H:0,  A:10},
  'Reparacion maquinas':    {T:10, V:30,  H:40, A:20},
  'Banco':                  {T:30, V:30,  H:20, A:20},
  'Mercado Pago':           {T:80, V:20,  H:0,  A:0},
  'Tarjetas':               {T:40, V:40,  H:10, A:10},
  'Gases':                  {T:60, V:20,  H:0,  A:20},
  'Limpieza':               {T:100,V:0,   H:0,  A:0},
  'Viveres personal':       {T:40, V:20,  H:20, A:20},
  'Insumos bolsas':         {T:60, V:40,  H:0,  A:0},
  'DEFAULT':                {T:25, V:25,  H:25, A:25},
};

// Palabras clave para clasificar categorías de Alegra
const KEYWORDS = {
  T: ['alojamiento','hospedaje','restaurant','restaurante','visita','almuerzo','cena','hospitalidad','transfer','cocinero','cocina','limpieza'],
  V: ['vino','vinos','bodega','viñedo','vinedo','enolog','etiqueta','corcho','botella','flete vino','exportacion','inv ','fraccionamiento','laboratorio','insumos elaboracion'],
  H: ['hacienda','veterinaria','pasturas','fardos','rollos','ganader'],
  A: ['inmobiliario','habilitacion','dominio','gsuite','alegra','impuesto','iibb','banco','prestamo','seguro','honorarios contador','renta'],
};

function clasificarCategoria(nombre) {
  const n = (nombre||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for (const [area, words] of Object.entries(KEYWORDS)) {
    if (words.some(w => n.includes(w))) return area;
  }
  return null;
}

function getDistribucion(categoria, concepto) {
  const n = (concepto||categoria||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for (const [key, dist] of Object.entries(DIST)) {
    if (key === 'DEFAULT') continue;
    if (n.includes(key.toLowerCase())) return dist;
  }
  const area = clasificarCategoria(n);
  if (area === 'T') return {T:100,V:0,H:0,A:0};
  if (area === 'V') return {T:0,V:100,H:0,A:0};
  if (area === 'H') return {T:0,V:0,H:100,A:0};
  if (area === 'A') return {T:0,V:0,H:0,A:100};
  return DIST.DEFAULT;
}

// ── ESTADO ───────────────────────────────────────────────
let periodo = 'trimestre';
let datos = null;

function setPeriodo(p) {
  periodo = p;
  document.querySelectorAll('.periodo-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().includes(p === 'mes' ? 'mes' : p === 'trimestre' ? 'Trim' : 'año')));
  if (datos) renderDashboard(datos);
  else cargarDatos();
}

function getFechas() {
  const hoy = new Date();
  let desde, hasta = hoy.toISOString().split('T')[0];
  if (periodo === 'mes') {
    desde = new Date(hoy.getFullYear(), hoy.getMonth(), 1).toISOString().split('T')[0];
  } else if (periodo === 'trimestre') {
    desde = new Date(hoy.getFullYear(), hoy.getMonth() - 2, 1).toISOString().split('T')[0];
  } else {
    desde = new Date(hoy.getFullYear(), 0, 1).toISOString().split('T')[0];
  }
  return { desde, hasta };
}

// ── FETCH VÍA PROXY (Google Apps Script) ─────────────────
async function cargarDatos() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '⏳ Cargando...';
  btn.classList.add('loading');
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const { desde, hasta } = getFechas();
    const url = PROXY_URL + '?action=rentabilidad&desde=' + desde + '&hasta=' + hasta;
    const r = await fetch(url);
    if (!r.ok) throw new Error('Error de conexión: ' + r.status);
    const result = await r.json();
    if (result.error) throw new Error(result.error);

    // Convertir formato del proxy al formato del dashboard
    datos = {
      areas: result.areas,
      nombres: { T:'Turismo', V:'Vinos', H:'Hacienda', A:'Administración' },
      total: result.total,
    };

    renderDashboard(datos);

    const ahora = new Date();
    document.getElementById('last-sync').textContent =
      `Actualizado ${ahora.getHours()}:${String(ahora.getMinutes()).padStart(2,'0')} · ${result.cantFacturas} facturas · ${result.cantGastos} gastos`;
  } catch(e) {
    mostrarError(e.message);
    datos = getDemoData();
    renderDashboard(datos);
  } finally {
    btn.textContent = '↻ Actualizar';
    btn.classList.remove('loading');
    const loadEl = document.getElementById('loading');
    if (loadEl) loadEl.style.display = 'none';
  }
}

function procesarDatos(facturas, gastos) {
  const areas = { T:{ing:0,egr:0,items:[]}, V:{ing:0,egr:0,items:[]}, H:{ing:0,egr:0,items:[]}, A:{ing:0,egr:0,items:[]} };
  const nombres = { T:'Turismo', V:'Vinos', H:'Hacienda', A:'Administración' };

  // Procesar ingresos
  (Array.isArray(facturas) ? facturas : []).filter(f => f.status !== 'void').forEach(f => {
    const items = f.items || [];
    if (items.length) {
      items.forEach(item => {
        const nombre = item.name || '';
        const area = clasificarCategoria(nombre) || 'T';
        const monto = parseFloat(item.total || item.price || 0);
        if (areas[area]) areas[area].ing += monto;
      });
    } else {
      const monto = parseFloat(f.total || 0);
      areas.T.ing += monto;
    }
  });

  // Procesar egresos con distribución
  (Array.isArray(gastos) ? gastos : []).filter(g => g.status !== 'void').forEach(g => {
    const items = g.items || [];
    const procesarItem = (nombre, monto) => {
      const dist = getDistribucion('', nombre);
      ['T','V','H','A'].forEach(a => {
        const pct = dist[a] / 100;
        if (pct > 0) areas[a].egr += monto * pct;
      });
    };
    if (items.length) {
      items.forEach(item => procesarItem(item.name || '', parseFloat(item.total || item.price || 0)));
    } else {
      procesarItem('', parseFloat(g.total || 0));
    }
  });

  return { areas, nombres, total: {
    ing: Object.values(areas).reduce((s,a) => s+a.ing, 0),
    egr: Object.values(areas).reduce((s,a) => s+a.egr, 0),
  }};
}

// ── DATOS DEMO (si falla API) ────────────────────────────
function getDemoData() {
  return {
    areas: {
      T: { ing: 57132739, egr: 18420000 },
      V: { ing: 56405849, egr: 32180000 },
      H: { ing: 48585860, egr: 28340000 },
      A: { ing: 0,        egr: 15600000 },
    },
    nombres: { T:'Turismo', V:'Vinos', H:'Hacienda', A:'Administración' },
    total: { ing: 162124448, egr: 94540000 },
    esDemo: true,
  };
}

// ── RENDER ───────────────────────────────────────────────
const COLORES = { T:'#1F4E79', V:'#4A4078', H:'#633806', A:'#444441' };
const COLORES_BG = { T:'#E3EEF9', V:'#EEEDFE', H:'#FAEEDA', A:'#F1EFE8' };
const ICONOS = { T:'🏠', V:'🍷', H:'🐄', A:'⚙️' };

function fmtARS(n) {
  if (!n) return '—';
  const abs = Math.abs(Math.round(n));
  if (abs >= 1000000) return (n < 0 ? '-' : '') + 'ARS ' + (abs/1000000).toFixed(1) + 'M';
  if (abs >= 1000) return (n < 0 ? '-' : '') + 'ARS ' + Math.round(abs/1000) + 'k';
  return 'ARS ' + abs.toLocaleString('es-AR');
}

function pctStr(n) {
  return (n >= 0 ? '+' : '') + Math.round(n) + '%';
}

let chartDonaIng = null, chartDonaEgr = null, chartEvol = null;

function renderDashboard(d) {
  const res = d.total.ing - d.total.egr;
  const margen = d.total.ing ? (res / d.total.ing * 100) : 0;

  const demoAviso = d.esDemo ? `
    <div style="background:#FDF6DC;border:1px solid #EFD97A;border-radius:var(--rs);padding:10px 14px;font-family:sans-serif;font-size:12px;color:#633806;margin-bottom:14px">
      ⚠ Mostrando datos de ejemplo — no se pudo conectar con Alegra. Verificá tu conexión y actualizá.
    </div>` : '';

  document.getElementById('main-content').innerHTML = `
    ${demoAviso}

    <div class="section-label">Resultado del negocio</div>
    <div class="g4" style="margin-bottom:20px">
      <div class="kpi ${d.total.ing > 0 ? 'pos' : 'neutral'}">
        <div class="kl">Total ingresos</div>
        <div class="kv">${fmtARS(d.total.ing)}</div>
        <div class="ks">Todas las áreas</div>
      </div>
      <div class="kpi neg">
        <div class="kl">Total egresos</div>
        <div class="kv">${fmtARS(d.total.egr)}</div>
        <div class="ks">Todas las áreas</div>
      </div>
      <div class="kpi ${res >= 0 ? 'pos' : 'neg'}">
        <div class="kl">Resultado neto</div>
        <div class="kv">${fmtARS(res)}</div>
        <div class="ks">${res >= 0 ? 'Superávit' : 'Déficit'}</div>
      </div>
      <div class="kpi ${margen >= 0 ? 'pos' : 'neg'}">
        <div class="kl">Margen</div>
        <div class="kv">${pctStr(margen)}</div>
        <div class="ks">${margen >= 15 ? 'Rentable' : margen >= 0 ? 'Bajo margen' : 'Pérdida'}</div>
      </div>
    </div>

    <div class="section-label">Rentabilidad por área</div>
    <div class="g4" style="margin-bottom:20px" id="area-cards"></div>

    <div class="g2" style="margin-bottom:20px">
      <div class="card">
        <div class="ch"><h3>Ingresos por área</h3></div>
        <div class="cb"><canvas id="chart-ing" height="200"></canvas></div>
      </div>
      <div class="card">
        <div class="ch"><h3>Egresos por área</h3></div>
        <div class="cb"><canvas id="chart-egr" height="200"></canvas></div>
      </div>
    </div>

    <div class="section-label">Comparación detallada</div>
    <div class="card" style="margin-bottom:20px">
      <div class="tw">
        <table>
          <thead>
            <tr>
              <th>Área</th>
              <th style="text-align:right">Ingresos</th>
              <th style="text-align:right">Egresos</th>
              <th style="text-align:right">Resultado</th>
              <th style="text-align:right">Margen</th>
              <th>Participación ing.</th>
            </tr>
          </thead>
          <tbody id="tabla-areas"></tbody>
        </table>
      </div>
    </div>

    <div class="section-label">Distribución de egresos por área</div>
    <div class="card" style="margin-bottom:20px" id="barras-egr"></div>
  `;

  // Renderizar tarjetas por área
  const totalIng = d.total.ing || 1;
  const cards = ['T','V','H','A'].map(a => {
    const area = d.areas[a];
    const r = area.ing - area.egr;
    const mg = area.ing ? (r / area.ing * 100) : (r < 0 ? -100 : 0);
    return `
      <div class="area-card">
        <div class="area-head" style="border-left:4px solid ${COLORES[a]}">
          <div class="area-name">${ICONOS[a]} ${d.nombres[a]}</div>
          <div class="area-sub">${pctStr(area.ing/totalIng*100)} del total</div>
        </div>
        <div class="area-body">
          <div class="area-row"><span class="lbl">Ingresos</span><span class="val pos">${fmtARS(area.ing)}</span></div>
          <div class="area-row"><span class="lbl">Egresos</span><span class="val neg">${fmtARS(area.egr)}</span></div>
          <div class="area-row">
            <span class="lbl">Resultado</span>
            <span class="val ${r >= 0 ? 'pos' : 'neg'}">${fmtARS(r)}</span>
          </div>
          <div style="margin-top:10px">
            <span class="badge ${mg >= 0 ? 'b-pos' : 'b-neg'}">${pctStr(mg)} margen</span>
          </div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('area-cards').innerHTML = cards;

  // Tabla detallada
  const filas = ['T','V','H','A'].map(a => {
    const area = d.areas[a];
    const r = area.ing - area.egr;
    const mg = area.ing ? (r / area.ing * 100) : (r < 0 ? -100 : 0);
    const pct = Math.round(area.ing / totalIng * 100);
    return `<tr>
      <td><span style="display:inline-flex;align-items:center;gap:6px">
        <span style="width:10px;height:10px;border-radius:50%;background:${COLORES[a]};flex-shrink:0"></span>
        ${ICONOS[a]} ${d.nombres[a]}
      </span></td>
      <td style="text-align:right;color:#27500A;font-weight:500">${fmtARS(area.ing)}</td>
      <td style="text-align:right;color:#791F1F;font-weight:500">${fmtARS(area.egr)}</td>
      <td style="text-align:right;font-weight:600;color:${r >= 0 ? '#27500A' : '#791F1F'}">${fmtARS(r)}</td>
      <td style="text-align:right"><span class="badge ${mg >= 0 ? 'b-pos' : 'b-neg'}">${pctStr(mg)}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:7px;background:var(--g5);border-radius:99px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${COLORES[a]};border-radius:99px"></div>
          </div>
          <span style="font-size:11px;color:var(--g3);min-width:28px">${pct}%</span>
        </div>
      </td>
    </tr>`;
  });
  // Fila total
  filas.push(`<tr>
    <td>TOTAL</td>
    <td style="text-align:right;color:#27500A">${fmtARS(d.total.ing)}</td>
    <td style="text-align:right;color:#791F1F">${fmtARS(d.total.egr)}</td>
    <td style="text-align:right;color:${res >= 0 ? '#27500A' : '#791F1F'}">${fmtARS(res)}</td>
    <td style="text-align:right"><span class="badge ${margen >= 0 ? 'b-pos' : 'b-neg'}">${pctStr(margen)}</span></td>
    <td></td>
  </tr>`);
  document.getElementById('tabla-areas').innerHTML = filas.join('');

  // Barras distribución egresos
  const maxEgr = Math.max(...['T','V','H','A'].map(a => d.areas[a].egr), 1);
  document.getElementById('barras-egr').innerHTML = `<div style="padding:14px 16px">` +
    ['T','V','H','A'].map(a => {
      const pct = Math.round(d.areas[a].egr / maxEgr * 100);
      return `<div class="bar-wrap">
        <div class="bar-lbl">
          <span>${ICONOS[a]} ${d.nombres[a]}</span>
          <span style="font-weight:500;color:var(--rojo)">${fmtARS(d.areas[a].egr)}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${COLORES[a]}"></div>
        </div>
      </div>`;
    }).join('') + `</div>`;

  // Gráficas
  renderCharts(d);
}

function renderCharts(d) {
  if (chartDonaIng) chartDonaIng.destroy();
  if (chartDonaEgr) chartDonaEgr.destroy();

  const labels = ['T','V','H','A'].map(a => ['Turismo','Vinos','Hacienda','Adm'][['T','V','H','A'].indexOf(a)]);
  const colores = ['T','V','H','A'].map(a => COLORES[a]);
  const ingVals = ['T','V','H','A'].map(a => Math.round(d.areas[a].ing));
  const egrVals = ['T','V','H','A'].map(a => Math.round(d.areas[a].egr));

  const opts = {
    responsive: true,
    plugins: {
      legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12, padding: 12 } },
      tooltip: {
        callbacks: {
          label: ctx => ' ' + fmtARS(ctx.raw)
        }
      }
    }
  };

  chartDonaIng = new Chart(document.getElementById('chart-ing'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: ingVals, backgroundColor: colores, borderWidth: 0 }] },
    options: { ...opts }
  });

  chartDonaEgr = new Chart(document.getElementById('chart-egr'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: egrVals, backgroundColor: colores, borderWidth: 0 }] },
    options: { ...opts }
  });
}

function mostrarError(msg) {
  const el = document.getElementById('error-box');
  if (el) { el.textContent = '⚠ ' + msg + ' — Mostrando datos de ejemplo.'; el.style.display = 'block'; }
  console.error('Dashboard error:', msg);
}

// Iniciar
cargarDatos();
</script>
